version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: euroaibench-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: euroaibench
      POSTGRES_USER: euroaibench
      POSTGRES_PASSWORD: EuroAI2026!
    ports:
      - "5435:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U euroaibench -d euroaibench"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile
    image: euroaibench-api
    container_name: euroaibench-api
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: euroaibench-frontend
    restart: unless-stopped
    ports:
      - "3200:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

networks:
  default:
    name: euroaibench-network
